<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Wayback Recon</title>
    <style>
        body{font-family:Tahoma;background:#0f172a;color:#e2e8f0;padding:40px;text-align:center}
        input{padding:12px;width:300px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#fff}
        button{padding:12px 24px;border-radius:8px;border:0;background:#3b82f6;color:#fff;cursor:pointer;margin-right:10px}
        #result{margin-top:30px;text-align:right}
        .stat{background:#1e293b;padding:15px;margin:10px;border-radius:8px;display:inline-block;min-width:120px}
        a{color:#3b82f6}
    </style>
</head>
<body>
    <h2>Wayback Recon Scanner</h2>
    <input type="text" id="domain" placeholder="example.com">
    <button onclick="scan()">Scan</button>
    <div id="result"></div>

<script>
async function scan(){
    let domain = document.getElementById('domain').value;
    document.getElementById('result').innerHTML = 'جاري الفحص...';
    let res = await fetch('/scan/' + domain);
    let data = await res.json();
    
    let html = `<h3>نتايج ${data.domain}</h3>`;
    html += `<p>إجمالي الروابط: ${data.total_found} | تم فحص: ${data.checked}</p>`;
    
    for(let key in data.stats){
        html += `<div class="stat"><b>${key}</b><br>${data.stats[key]}</div>`;
    }
    
    if(data.download){
        html += `<br><br><a href="${data.download}">تحميل النتائج ZIP</a>`;
    }
    
    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
